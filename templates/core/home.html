{% extends "base.html" %}

{% block content %}

<div class="grid md:grid-cols-3 gap-6">

    <!-- LEFT SIDEBAR
    <div class="hidden md:block bg-white rounded-xl shadow p-4 h-fit">
        <h3 class="font-semibold mb-3">Quick Links</h3>
        <a href="{% url 'profile' %}" class="block py-2 hover:text-blue-600">My Profile</a>
        <a href="#" class="block py-2 hover:text-blue-600">Messages</a>
    </div> -->

    <!-- MAIN SECTION -->
    <div class="md:col-span-2 space-y-6">

        {% if query %}
        <div class="bg-white rounded-xl shadow p-6">
            <h2 class="text-xl font-semibold mb-4">Search Results</h2>

            {% for u in users %}
            <div class="flex justify-between items-center border-b py-3">
                <a href="{% url 'user_profile' u.id %}" 
                   class="font-medium hover:text-blue-600">
                    {{ u.username }}
                </a>

                <a href="{% url 'send_request' u.id %}"
                   class="bg-blue-600 text-white px-4 py-1 rounded-full hover:bg-blue-700">
                    Connect
                </a>
            </div>
            {% empty %}
            <p>No users found.</p>
            {% endfor %}
        </div>
        {% else %}
        <div class="bg-white rounded-xl shadow p-8 text-center">
            <h2 class="text-2xl font-semibold text-gray-700">
                Welcome to LPU Connect 🎓
            </h2>
            <p class="text-gray-500 mt-2">
                Search and connect with students from your university.
            </p>
        </div>
        {% endif %}

    </div>
</div>

{% endblock %}
