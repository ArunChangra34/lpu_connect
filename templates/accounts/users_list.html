{% extends "base.html" %}
{% block content %}

<div class="bg-white rounded-2xl shadow p-6">
    <h2 class="text-xl font-semibold mb-6">All Students</h2>

    {% for u in users %}
    <div class="flex justify-between items-center border-b py-3">
        <a href="{% url 'user_profile' u.id %}" 
           class="font-medium hover:text-blue-600">
            {{ u.username }}
        </a>

        <a href="{% url 'send_request' u.id %}"
           class="bg-blue-600 text-white px-4 py-1 rounded-full hover:bg-blue-700">
            Connect
        </a>
    </div>
    {% empty %}
    <p>No users found.</p>
    {% endfor %}
</div>

{% endblock %}
