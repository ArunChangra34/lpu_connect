{% extends "base.html" %}
{% block content %}

<div class="bg-white rounded-2xl shadow p-6">
    <h2 class="text-xl font-semibold mb-6">Requests</h2>

    {% for r in requests %}
    <div class="flex justify-between items-center border-b py-3">
        <a href="{% url 'user_profile' r.from_user.id %}"
           class="font-medium hover:text-blue-600">
            {{ r.from_user.username }}
        </a>

        <div class="space-x-3">
            <a href="{% url 'accept_request' r.id %}"
               class="bg-green-500 text-white px-4 py-1 rounded-full hover:bg-green-600">
                Accept
            </a>
        </div>
    </div>
    {% empty %}
    <p>No pending requests.</p>
    {% endfor %}
</div>

{% endblock %}
